# pg_service.conf for lilasp-webgis qwc-services stack
# This file is a TEMPLATE — actual file is generated by init-secrets container
# from PG_SERVICE_CONF environment variable (set in Coolify, never in git).

[qwc_configdb]
host=config-db
port=5432
dbname=qwc_services
user=qwc_admin
password=PLACEHOLDER_CONFIG_DB_PASSWORD
sslmode=disable

[qwc_wiesbaden]
host=host.docker.internal
port=6432
dbname=lilasp_wiesbaden
user=qwc_service
password=PLACEHOLDER_QWC_SERVICE_DB_PASSWORD
sslmode=disable

