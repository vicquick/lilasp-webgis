# PostgreSQL service file for qwc-services
# All passwords injected via environment at runtime — see .env
# DO NOT commit real passwords.

[qwc_config]
host=config-db
port=5432
dbname=qwc_config
user=qwc_config_admin
password=${CONFIG_DB_PASSWORD}

# Host pg18 data databases (qwc-data-service, qwc-feature-info-service)
# host.docker.internal resolves to host gateway on Linux via extra_hosts in compose
[qwc_wiesbaden]
host=host.docker.internal
port=6432
dbname=lilasp_wiesbaden
user=qwc_service
password=${QWC_SERVICE_DB_PASSWORD}

[qwc_cuxhaven]
host=host.docker.internal
port=6432
dbname=lilasp_cuxhaven
