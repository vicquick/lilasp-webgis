# nginx API gateway for lilasp-webgis
# Routes auth/api/ows to qwc services; enforces hard-redirect to /auth/login
# for any user without a jwt cookie on browser navigation.

proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_read_timeout 120s;

map $cookie_jwt $is_authed {
    default 0;
    "~.+"   1;
}

server {
    listen 80;
    server_name _;
    absolute_redirect off;
    port_in_redirect off;

    # ── Auth service (always accessible) ─────────────────────────
    # ^~ prevents the static-assets regex below from intercepting
    # /auth/static/favicon.svg etc.
    location ^~ /auth/ {
        proxy_pass http://auth-adapter:5000;
    }

    # ── OGC (WMS/WFS) — redirect browsers, 401 for anything else ─
    location /ows/ {
        if ($is_authed = 0) { return 302 /auth/login?url=$request_uri; }
        proxy_pass http://qwc-ogc-service:9090/;
    }

    # ── Feature data REST API — JSON 401 (QWC2 handles this) ─────
    location /api/v1/data/ {
        if ($is_authed = 0) { return 401; }
        proxy_pass http://qwc-data-service:9090/;
    }

    location /api/v1/feature-info/ {
        if ($is_authed = 0) { return 401; }
        proxy_pass http://qwc-feature-info-service:9090/;
    }

    location /api/v1/print/ {
        if ($is_authed = 0) { return 401; }
        proxy_pass http://qwc-print-service:9090/;
    }

    location /api/v1/permalink/ {
        proxy_pass http://qwc-permalink-service:9090/;
    }

    location /api/v1/config/ {
        if ($is_authed = 0) { return 401; }
        proxy_pass http://qwc-map-viewer:9090/api/v1/config/;
    }

    # ── JSON manifests (themes.json, config.json) — 401 when unauth
    location = /themes.json {
        if ($is_authed = 0) { return 401; }
        proxy_pass http://qwc-map-viewer:9090;
    }
    location = /config.json {
        if ($is_authed = 0) { return 401; }
        proxy_pass http://qwc-map-viewer:9090;
    }

    # ── Static assets (let CSS/JS/images load anywhere) ──────────
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff2?|ttf|eot|map)$ {
        proxy_pass http://qwc-map-viewer:9090;
    }

    # ── Map viewer (React SPA) — hard redirect unauth browsers ───
    location / {
        if ($is_authed = 0) { return 302 /auth/login?url=$request_uri; }
        proxy_pass http://qwc-map-viewer:9090;
    }
}
