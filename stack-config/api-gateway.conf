# nginx API gateway for lilasp-webgis
# Routes all /auth/, /api/, /ows/ to appropriate qwc services
# Static map viewer served by qwc-map-viewer

proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_read_timeout 120s;

server {
    listen 80;
    server_name _;

    # Auth (QFC-backed auth adapter)
    location /auth/ {
        proxy_pass http://auth-adapter:5000;
    }

    # OGC (WMS/WFS via permission-enforcing proxy)
    location /ows/ {
        proxy_pass http://qwc-ogc-service:9090/;
    }

    # Feature data REST API (editing)
    location /api/v1/data/ {
        proxy_pass http://qwc-data-service:9090/;
    }

    # Feature info
    location /api/v1/feature-info/ {
        proxy_pass http://qwc-feature-info-service:9090/;
    }

    # Print
    location /api/v1/print/ {
        proxy_pass http://qwc-print-service:9090/;
    }

    # Permalink
    location /api/v1/permalink/ {
        proxy_pass http://qwc-permalink-service:9090/;
    }

    # Config (themes, plugins config for the frontend)
    location /api/v1/config/ {
        proxy_pass http://qwc-map-viewer:9090/api/v1/config/;
    }

    # Map viewer (everything else — React app + config endpoint)
    location / {
        proxy_pass http://qwc-map-viewer:9090;
    }
}
