# Authentik forward-auth middleware.
# Apply as Docker label on the public router:
#   traefik.http.routers.planportal.middlewares=authentik-auth@file
#
# `trustForwardHeader: true` is mandatory — without it the outpost cannot
# resolve the original client URL and login redirects loop.
#
# Note: X-authentik-Groups is PIPE-separated (`a|b|c`), not comma. Splitters
# elsewhere in the stack MUST split on '|'.

http:
  middlewares:
    authentik-auth:
      forwardAuth:
        address: 'http://authentik-server:9000/outpost.goauthentik.io/auth/traefik'
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-entitlements
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version
