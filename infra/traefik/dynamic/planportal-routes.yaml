# Planportal Traefik dynamic routes (Coolify production).
# Single public host: webgis.lilasp.de → planportal-web. ALL internal
# services (qgis-server, martin, auth-gateway, indexer, postgres, redis)
# have ZERO Traefik labels and are unreachable from the internet — nginx
# in the web container reverse-proxies them across the `planportal`
# docker network.

http:
  routers:
    planportal-web:
      rule: 'Host(`webgis.lilasp.de`)'
      entryPoints: [https]
      service: planportal-web
      middlewares:
        - planportal-security-headers@file
        - authentik-auth@file
      tls:
        certResolver: letsencrypt

  middlewares:
    # Strict security headers applied to every public response.
    planportal-security-headers:
      headers:
        # Reject HTTP on www subdomain forever once verified working.
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: 'strict-origin-when-cross-origin'
        frameDeny: true
        # CSP — tighten as the SPA stabilises. WMS GetFeatureInfo returns
        # arbitrary HTML; relax cautiously.
        contentSecurityPolicy: >-
          default-src 'self';
          img-src 'self' data: blob: https:;
          style-src 'self' 'unsafe-inline';
          script-src 'self' 'unsafe-inline' 'unsafe-eval';
          connect-src 'self' https://webgis.lilasp.de;
          font-src 'self' data:;
          frame-ancestors 'none';
        permissionsPolicy: >-
          camera=(),
          microphone=(),
          geolocation=(self),
          interest-cohort=()
        customResponseHeaders:
          X-Permitted-Cross-Domain-Policies: 'none'
          X-Robots-Tag: 'noindex, nofollow'
          Server: ''

  services:
    planportal-web:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: 'http://planportal-web:80'
