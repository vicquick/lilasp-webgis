# Custom Traefik serversTransport for the planportal-web service so the
# proxy can wait out py-qgis-server's first-load latency on large QGIS
# projects (Cuxhaven has 46 layers; GetCapabilities = 1-3 min cold).
# Default forwardingTimeouts.responseHeaderTimeout is 0 (unbounded) but
# idleConnTimeout is 90s, which kills the connection.
#
# NOT auto-generated by Coolify. Safe to edit manually.

http:
  serversTransports:
    planportal-longtimeout:
      forwardingTimeouts:
        dialTimeout: 10s
        responseHeaderTimeout: 300s
        idleConnTimeout: 300s
