# Planportal — production stack for Coolify dockercompose build pack.
#
# Coolify auto-adds:
#   - a per-app docker network `{uuid}` joined by every service
#   - service-name DNS (so `qgisserver`, `martin`, `auth-gateway` resolve)
#   - Traefik labels on services whose fqdn is set in Coolify
#
# We override Coolify's default behaviour where it matters:
#   - PUBLIC = only `web`. All other services have NO Traefik labels.
#   - Internal traffic routes via nginx in `web` over the planportal network.
#   - /srv/gis-staging on the HOST is bind-mounted into qgis-server + indexer
#     as /srv/gis (read-write for indexer, read-only for qgis-server).
#
# Local dev (no Coolify): cp .env.example .env && docker compose up -d.

services:

  postgres:
    image: postgis/postgis:18-3.6-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-planportal}
      POSTGRES_USER: ${POSTGRES_USER:-planportal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # PG 18+ wants the major-version-specific layout: mount the parent so
      # the daemon manages /var/lib/postgresql/18/. See docker-library/postgres#1259.
      - postgres-data:/var/lib/postgresql
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-planportal}']
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 120s
    networks: [planportal]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}', '--maxmemory', '256mb', '--maxmemory-policy', 'allkeys-lru', '--save', '']
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 8
    networks: [planportal]
    restart: unless-stopped

  qgisserver:
    build:
      context: ./services/qgis-server
    environment:
      QGSRV_SERVER_WORKERS: ${QGSRV_SERVER_WORKERS:-4}
      QGSRV_SERVER_TIMEOUT: ${QGSRV_SERVER_TIMEOUT:-60}
      QGSRV_SERVER_HTTP_PROXY: 'yes'
      QGSRV_SERVER_PROXY_URL: ${QGSRV_SERVER_PROXY_URL:-https://webgis.lilasp.de/qgisserver}
      QGSRV_SERVER_MEMORY_HIGH_WATER_MARK: '0.85'
      QGSRV_CACHE_SIZE: ${QGSRV_CACHE_SIZE:-30}
      QGSRV_CACHE_ROOTDIR: /srv/gis
      QGSRV_CACHE_CHECK_INTERVAL: '300'
      QGSRV_CACHE_STRICT_CHECK: 'no'
      QGSRV_TRUST_LAYER_METADATA: 'yes'
      QGSRV_LOGGING_LEVEL: ${QGSRV_LOGGING_LEVEL:-INFO}
      QGIS_SERVER_PARALLEL_RENDERING: '0'
    volumes:
      # Host bind-mount: project files (.qgz with embedded creds) live OFF git.
      - /srv/gis-staging:/srv/gis:ro
      - qgis-home:/home/qgis
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- "http://127.0.0.1:8080/?SERVICE=WMS&REQUEST=GetCapabilities" >/dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
    networks: [planportal]
    restart: unless-stopped

  martin:
    image: ghcr.io/maplibre/martin:v0.18.0
    # No config file — martin picks up DATABASE_URL from env and auto-discovers
    # PMTiles in /srv/tiles. Coolify's file-bind handler creates dirs at the
    # mount target when the source file is relative, which breaks martin
    # (`Is a directory`). Stay CLI-args + env-vars for simplicity.
    command:
      - '--listen-addresses=0.0.0.0:3000'
      - '--pool-size=10'
      - '--default-srid=25832'
      - '/srv/tiles'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-planportal}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-planportal}
    volumes:
      - /srv/gis-staging-tiles:/srv/tiles:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://127.0.0.1:3000/health >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    networks: [planportal]
    restart: unless-stopped

  indexer:
    build:
      context: ./services/indexer
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-planportal}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-planportal}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      QGS_ROOT: /srv/gis
      TILES_ROOT: /srv/tiles
      WEB_SERVICES_JSON: /srv/web/services.json
      PYQGIS_URL: http://qgisserver:8080
      PUBLIC_QGIS_BASE: /qgisserver
      PUBLIC_TILES_BASE: /tiles
      INDEXER_DEBOUNCE_SECONDS: ${INDEXER_DEBOUNCE_SECONDS:-2}
      QFC_BASE_URL: ${QFC_BASE_URL:-}
      QFC_ADMIN_TOKEN: ${QFC_ADMIN_TOKEN:-}
      QFC_SYNC_INTERVAL_MINUTES: ${QFC_SYNC_INTERVAL_MINUTES:-15}
      LOG_LEVEL: ${INDEXER_LOG_LEVEL:-INFO}
    volumes:
      - /srv/gis-staging:/srv/gis
      - /srv/gis-staging-tiles:/srv/tiles
      - web-static:/srv/web
    depends_on:
      postgres:
        condition: service_healthy
    networks: [planportal]
    restart: unless-stopped

  auth-gateway:
    build:
      context: ./services/auth-gateway
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://127.0.0.1:5000/health >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
    networks: [planportal]
    restart: unless-stopped

  web:
    build:
      context: ./services/web
      args:
        WEB_QGIS_BASE: /qgisserver
        WEB_TILES_BASE: /tiles
        WEB_WHOAMI: /whoami
        WEB_SERVICES_JSON_URL: /services.json
    volumes:
      - web-static:/usr/share/nginx/html/data:ro
    expose:
      - '80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://127.0.0.1/healthz >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      qgisserver:
        condition: service_started
      martin:
        condition: service_started
      auth-gateway:
        condition: service_started
    networks: [planportal, coolify]
    restart: unless-stopped
    # Public router — Authentik forward-auth added once Authentik is online.
    # Until then, basic-auth at the Coolify level (set on the application).
    # `$$` escapes `$` for Coolify's env-var templating.
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.planportal-web.rule=Host(`webgis.lilasp.de`)
      - traefik.http.routers.planportal-web.entrypoints=https
      - traefik.http.routers.planportal-web.priority=9500
      - traefik.http.routers.planportal-web.tls=true
      - traefik.http.routers.planportal-web.tls.certresolver=letsencrypt
      - traefik.http.routers.planportal-web.middlewares=planportal-sec@docker,planportal-rl@docker,planportal-auth@docker
      - traefik.http.services.planportal-web.loadbalancer.server.port=80
      - traefik.http.services.planportal-web.loadbalancer.serversTransport=planportal-longtimeout@file
      # ── security headers middleware (HSTS preload, CSP, frame-deny) ──
      - traefik.http.middlewares.planportal-sec.headers.stsSeconds=63072000
      - traefik.http.middlewares.planportal-sec.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.planportal-sec.headers.stsPreload=true
      - traefik.http.middlewares.planportal-sec.headers.forceSTSHeader=true
      - traefik.http.middlewares.planportal-sec.headers.contentTypeNosniff=true
      - traefik.http.middlewares.planportal-sec.headers.browserXssFilter=true
      - "traefik.http.middlewares.planportal-sec.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.planportal-sec.headers.frameDeny=true"
      - "traefik.http.middlewares.planportal-sec.headers.contentSecurityPolicy=default-src 'self'; img-src 'self' data: blob: https:; style-src 'self' 'unsafe-inline' https://rsms.me https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://webgis.lilasp.de; font-src 'self' data: https://rsms.me https://fonts.gstatic.com; frame-ancestors 'none'"
      - "traefik.http.middlewares.planportal-sec.headers.permissionsPolicy=camera=(), microphone=(), geolocation=(self), interest-cohort=()"
      - "traefik.http.middlewares.planportal-sec.headers.customResponseHeaders.X-Permitted-Cross-Domain-Policies=none"
      - "traefik.http.middlewares.planportal-sec.headers.customResponseHeaders.X-Robots-Tag=noindex, nofollow"
      - "traefik.http.middlewares.planportal-sec.headers.customResponseHeaders.Server="
      # ── rate-limit middleware (60 r/s burst 120) ──
      - traefik.http.middlewares.planportal-rl.ratelimit.average=60
      - traefik.http.middlewares.planportal-rl.ratelimit.burst=120
      - traefik.http.middlewares.planportal-rl.ratelimit.period=1s
      # ── basic-auth interim (until Authentik forward-auth replaces it) ──
      # Coolify auto-escapes `$` → `$$` in labels before docker-compose
      # render, which then unescapes back to `$`. So we write the literal
      # bcrypt hash with single `$` here. Password is the user-visible
      # one shared with the operator at deploy time; rotate before going
      # production-public.
      - "traefik.http.middlewares.planportal-auth.basicauth.users=admin:$2a$12$MScbxcqm48G25ban2USL0epPQqGQkBY4TYN96qO0rB6D3P/d2i40u"
      - traefik.http.middlewares.planportal-auth.basicauth.realm=Planportal

volumes:
  postgres-data:
  qgis-home:
  web-static:

networks:
  planportal:
    name: planportal
    external: true
  coolify:
    name: coolify
    external: true
