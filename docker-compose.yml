# lilasp-webgis — QWC2 services stack
# Managed via Coolify from vicquick/lilasp-webgis (git).
# All passwords via Coolify env vars — never committed to git.
# Secrets pattern: init-secrets runs write-pg-service.sh → /pg-config/pg_service.conf (passwords from env vars)
#
# Traefik routing: webgis-protect.yaml (priority 8000) routes webgis.lilasp.de → gateway
# QGIS Desktop /wfs/ and /wms/ paths stay on the existing QGIS Server (different Coolify service).

x-qwc-service-env: &qwc-service-env
  JWT_SECRET_KEY: '${JWT_SECRET}'
  JWT_COOKIE_CSRF_PROTECT: 'True'
  JWT_COOKIE_SAMESITE: 'Strict'
  PGSERVICEFILE: /pg-config/pg_service.conf

services:

  # ── Secrets bootstrap (writes pg_service.conf from env var to shared volume) ──
  init-secrets:
    image: 'alpine:3.21'
    container_name: lilasp-webgis-init-secrets
    environment:
      CONFIG_DB_PASSWORD: '${CONFIG_DB_PASSWORD}'
      QWC_SERVICE_DB_PASSWORD: '${QWC_SERVICE_DB_PASSWORD}'
    command: sh /stack-config/write-pg-service.sh
    volumes:
      - pg-config:/pg-config
      - './stack-config/write-pg-service.sh:/stack-config/write-pg-service.sh:ro'
    restart: 'no'

  # ── ConfigDB (qwc-base-db includes PostGIS + qwc_admin/service roles) ────────
  config-db:
    image: 'sourcepole/qwc-base-db:18'
    container_name: lilasp-webgis-configdb
    environment:
      POSTGRES_PASSWORD: '${CONFIG_DB_POSTGRES_PASSWORD}'
      QWC_ADMIN_PASSWORD: '${CONFIG_DB_PASSWORD}'
      QWC_SERVICE_PASSWORD: '${CONFIG_DB_SERVICE_PASSWORD}'
    volumes:
      - config-db-data:/var/lib/postgresql/docker
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - webgis-internal

  # ── ConfigDB migrations ────────────────────────────────────────────────────────
  config-db-migrate:
    image: 'sourcepole/qwc-base-db-migrate:latest-2026-lts'
    container_name: lilasp-webgis-migrate
    environment:
      PGSERVICEFILE: /pg-config/pg_service.conf
    volumes:
      - pg-config:/pg-config:ro
    depends_on:
      init-secrets:
        condition: service_completed_successfully
      config-db:
        condition: service_healthy
    networks:
      - webgis-internal
    restart: 'no'

  # ── Config Generator (reads config-in, writes generated config to config-out) ──
  qwc-config-service:
    image: 'sourcepole/qwc-config-generator:latest-2026-lts'
    container_name: lilasp-webgis-config
    environment:
      <<: *qwc-service-env
      INPUT_CONFIG_PATH: '/srv/qwc_service/config-in'
      OUTPUT_CONFIG_PATH: '/srv/qwc_service/config-out'
      GENERATE_DYNAMIC_KVRELS: '1'
    volumes:
      - pg-config:/pg-config:ro
      - './stack-config/config-in:/srv/qwc_service/config-in:ro'
      - './stack-config/qwc2-config.json:/srv/qwc_service/config.json:ro'
      - qwc-config:/srv/qwc_service/config-out
      - '/var/www/qgis-projects:/data:ro'
    depends_on:
      config-db-migrate:
        condition: service_completed_successfully
    networks:
      - webgis-internal

  # ── QGIS Server (sourcepole's optimized image) ────────────────────────────────
  qgis-server:
    image: 'sourcepole/qwc-qgis-server:3.40'
    container_name: lilasp-webgis-qgis
    environment:
      QGIS_SERVER_LOG_LEVEL: '1'
      QGIS_SERVER_LOG_STDERR: '1'
      QGIS_SERVER_PARALLEL_RENDERING: '1'
    volumes:
      - '/var/www/qgis-projects:/data:ro'
    tmpfs:
      - '/tmp/cache:size=128m'
    networks:
      - webgis-internal

  # ── Auth Adapter (custom — QFieldCloud creds → JWT) ───────────────────────────
  auth-adapter:
    build:
      context: ./auth-adapter
    container_name: lilasp-webgis-auth
    environment:
      JWT_SECRET: '${JWT_SECRET}'
      QFC_BASE_URL: '${QFC_BASE_URL}'
      FLASK_ENV: '${FLASK_ENV:-production}'
    networks:
      - webgis-internal
    restart: unless-stopped

  # ── OGC Service (WMS/WFS proxy with auth) ─────────────────────────────────────
  qwc-ogc-service:
    image: 'sourcepole/qwc-ogc-service:latest-2026-lts'
    container_name: lilasp-webgis-ogc
    environment:
      <<: *qwc-service-env
      SERVICE_MOUNTPOINT: '/ows'
    volumes:
      - pg-config:/pg-config:ro
      - qwc-config:/srv/qwc_service/config:ro
    depends_on:
      init-secrets:
        condition: service_completed_successfully
    networks:
      - webgis-internal

  # ── Data Service (WFS-T editing via qwc_service role) ─────────────────────────
  qwc-data-service:
    image: 'sourcepole/qwc-data-service:latest-2026-lts'
    container_name: lilasp-webgis-data
    environment:
      <<: *qwc-service-env
      SERVICE_MOUNTPOINT: '/api/v1/data'
    volumes:
      - pg-config:/pg-config:ro
      - qwc-config:/srv/qwc_service/config:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      init-secrets:
        condition: service_completed_successfully
    networks:
      - webgis-internal

  # ── Feature Info Service ──────────────────────────────────────────────────────
  qwc-feature-info-service:
    image: 'sourcepole/qwc-feature-info-service:latest-2026-lts'
    container_name: lilasp-webgis-featureinfo
    environment:
      <<: *qwc-service-env
      SERVICE_MOUNTPOINT: '/api/v1/featureinfo'
    volumes:
      - pg-config:/pg-config:ro
      - qwc-config:/srv/qwc_service/config:ro
    depends_on:
      init-secrets:
        condition: service_completed_successfully
    networks:
      - webgis-internal

  # ── Print Service ─────────────────────────────────────────────────────────────
  qwc-print-service:
    image: 'sourcepole/qwc-print-service:latest-2026-lts'
    container_name: lilasp-webgis-print
    environment:
      <<: *qwc-service-env
      SERVICE_MOUNTPOINT: '/api/v1/print'
    volumes:
      - qwc-config:/srv/qwc_service/config:ro
    networks:
      - webgis-internal

  # ── Permalink Service ─────────────────────────────────────────────────────────
  qwc-permalink-service:
    image: 'sourcepole/qwc-permalink-service:latest-2026-lts'
    container_name: lilasp-webgis-permalink
    environment:
      <<: *qwc-service-env
      SERVICE_MOUNTPOINT: '/api/v1/permalink'
    volumes:
      - pg-config:/pg-config:ro
      - qwc-config:/srv/qwc_service/config:ro
    depends_on:
      init-secrets:
        condition: service_completed_successfully
    networks:
      - webgis-internal

  # ── Map Viewer (custom build: QWC2 + shadcn/Recharts/lilasp plugins) ──────────
  qwc-map-viewer:
    build:
      context: .
    container_name: lilasp-webgis-viewer
    environment:
      <<: *qwc-service-env
      SERVICE_MOUNTPOINT: '/'
    volumes:
      - pg-config:/pg-config:ro
      - qwc-config:/srv/qwc_service/config:ro
    depends_on:
      - qwc-config-service
      - init-secrets
    networks:
      - webgis-internal

  # ── Admin GUI (internal — VPN-only via Traefik) ───────────────────────────────
  qwc-admin-gui:
    image: 'sourcepole/qwc-admin-gui:latest-2026-lts'
    container_name: lilasp-webgis-admin
    environment:
      <<: *qwc-service-env
      JWT_COOKIE_CSRF_PROTECT: 'False'
      GROUP_REGISTRATION_ENABLED: 'False'
      DEFAULT_LOCALE: 'de'
      MAIL_SUPPRESS_SEND: 'True'
    volumes:
      - pg-config:/pg-config:ro
      - qwc-config:/srv/qwc_service/config:ro
    depends_on:
      init-secrets:
        condition: service_completed_successfully
    networks:
      - webgis-internal
      - coolify
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - 'traefik.http.routers.webgis-admin.rule=Host(`webgis.lilasp.de`) && PathPrefix(`/admin`)'
      - 'traefik.http.routers.webgis-admin.entrypoints=https'
      - 'traefik.http.routers.webgis-admin.tls=true'
      - 'traefik.http.routers.webgis-admin.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.webgis-admin.priority=9000'
      - 'traefik.http.routers.webgis-admin.middlewares=vpn-only@file,webgis-admin-strip'
      - 'traefik.http.middlewares.webgis-admin-strip.stripprefix.prefixes=/admin'
      - 'traefik.http.services.webgis-admin.loadbalancer.server.port=5030'

  # ── API Gateway (nginx, public entry point → Traefik) ─────────────────────────
  qwc-api-gateway:
    image: 'nginx:1.27-alpine'
    container_name: lilasp-webgis-gateway
    volumes:
      - './stack-config/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro'
    depends_on:
      - auth-adapter
      - qwc-config-service
      - qwc-ogc-service
      - qwc-data-service
      - qwc-feature-info-service
      - qwc-map-viewer
    networks:
      - webgis-internal
      - coolify
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=coolify'
      - 'traefik.http.services.lilasp-webgis-gw.loadbalancer.server.port=80'
    restart: unless-stopped

volumes:
  pg-config:
  config-db-data:
  qwc-config:

networks:
  webgis-internal:
    name: lilasp-webgis-internal
  coolify:
    external: true
    name: coolify
