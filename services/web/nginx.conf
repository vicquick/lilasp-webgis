# Planportal web — single public entry point. Proxies the four internal
# services. NO direct internet exposure for qgisserver / martin /
# auth-gateway / postgres / redis / indexer.
#
# Security pattern:
# - Traefik in front of THIS container terminates TLS, runs
#   authentik-auth forward-auth, injects security headers.
# - Nginx here trusts X-Authentik-* response headers and passes them on
#   to upstreams. Outside the docker network, no one can reach the
#   upstreams.
# - Rate-limit on /qgisserver because GetPrint / GetMap are CPU-heavy.

# Rate-limit zone: 30 req/s per client, burst 60.
limit_req_zone $binary_remote_addr zone=qgis_rl:10m rate=30r/s;

# Connection-level cap for slowloris protection.
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version, default server banner.
    server_tokens off;

    # Reasonable upload cap for any future POST endpoint.
    client_max_body_size 16M;
    limit_conn conn_per_ip 32;

    # Forwarded-Proto trust comes from Traefik. We pass it through.
    set $real_scheme $http_x_forwarded_proto;
    if ($real_scheme = '') { set $real_scheme $scheme; }

    # ── Static services.json (indexer writes here via shared volume) ──
    location = /services.json {
        alias /usr/share/nginx/html/data/services.json;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # ── /qgisserver → py-qgis-server (rate-limited, big buffers) ──────
    location /qgisserver/ {
        limit_req zone=qgis_rl burst=60 nodelay;

        proxy_pass http://qgisserver:8080;
        proxy_http_version 1.1;
        proxy_set_header Host                 $host;
        proxy_set_header X-Real-IP            $remote_addr;
        proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto    $real_scheme;
        proxy_set_header X-Forwarded-Host     $host;
        # Pass Authentik headers downstream (defence-in-depth; py-qgis-server
        # ignores them, but if we later add a sidecar policy enforcer it
        # reads them).
        proxy_set_header X-Authentik-Username $http_x_authentik_username;
        proxy_set_header X-Authentik-Groups   $http_x_authentik_groups;

        proxy_read_timeout 120s;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 32 16k;
    }

    # ── /tiles → martin (vector tiles, long cache) ────────────────────
    location /tiles/ {
        proxy_pass http://martin:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        # Hot path — tile responses are immutable per PMTiles version.
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400, immutable" always;
    }

    # ── /whoami → auth-gateway (sidecar that echoes Authentik headers) ─
    location = /whoami {
        proxy_pass http://auth-gateway:5000/whoami;
        proxy_set_header X-Real-IP            $remote_addr;
        proxy_set_header X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto    $real_scheme;
        proxy_set_header X-Authentik-Username $http_x_authentik_username;
        proxy_set_header X-Authentik-Email    $http_x_authentik_email;
        proxy_set_header X-Authentik-Groups   $http_x_authentik_groups;
        proxy_set_header X-Authentik-Name     $http_x_authentik_name;
        proxy_set_header X-Authentik-Uid      $http_x_authentik_uid;
        # Browser may not send these; nginx auto-skips empty values via _.
        add_header Cache-Control "no-store" always;
    }

    # ── Internal health check (no auth required) ──────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── SPA fallback ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # Cache static assets; never cache HTML.
        location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
            access_log off;
            add_header Cache-Control "public, max-age=2592000, immutable" always;
            try_files $uri =404;
        }
        location ~* \.html?$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            try_files $uri =404;
        }
    }
}
