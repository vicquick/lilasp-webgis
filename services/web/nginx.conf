server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # The indexer writes services.json into a shared volume mounted at /data.
  location = /services.json {
    alias /usr/share/nginx/html/data/services.json;
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # Upstreams are routed by Traefik in prod. Local dev uses the vite dev
  # server (with its own proxy config) — nginx is only the production
  # static asset host.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
