<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 34" width="180" height="34" role="img" aria-label="LILASp WebGIS">
  <defs>
    <style>
      .mark { fill: #fafafa; }
      .word { fill: #fafafa; font-family: 'Fraunces', 'Iowan Old Style', Georgia, serif; font-size: 20px; font-weight: 500; letter-spacing: -0.015em; }
      .word-italic { font-style: italic; }
      .word-roman  { font-style: normal; font-weight: 400; opacity: 0.82; }
      .dim { fill: #fafafa; opacity: 0.60; font-family: 'Geist Mono', ui-monospace, Menlo, monospace; font-size: 10px; letter-spacing: 0.14em; }
    </style>
  </defs>
  <g>
    <rect x="2" y="5" width="24" height="24" rx="4" fill="#ffffff" fill-opacity="0.14"/>
    <text x="14" y="23" text-anchor="middle" font-family="Fraunces, Georgia, serif" font-style="italic" font-size="17" font-weight="500" class="mark">L</text>
  </g>
  <text x="36" y="23" class="word">
    <tspan class="word-italic">LIL</tspan><tspan class="word-roman">ASp</tspan>
  </text>
  <line x1="114" y1="11" x2="114" y2="25" stroke="#fafafa" stroke-opacity="0.22" stroke-width="1"/>
  <text x="122" y="22" class="dim">WEBGIS</text>
</svg>
